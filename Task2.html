<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch Web App</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:linear-gradient(135deg,#4facfe,#00f2fe);
    }

    .container{
        background:white;
        padding:30px;
        border-radius:15px;
        text-align:center;
        width:400px;
        box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    h1{
        margin-bottom:20px;
    }

    .display{
        font-size:40px;
        font-weight:bold;
        margin-bottom:20px;
    }

    button{
        padding:10px 18px;
        margin:5px;
        border:none;
        border-radius:8px;
        cursor:pointer;
        color:white;
        font-size:16px;
    }

    .start{
        background:#28a745;
    }

    .pause{
        background:#ffc107;
        color:black;
    }

    .reset{
        background:#dc3545;
    }

    .lap{
        background:#007bff;
    }

    ul{
        margin-top:20px;
        max-height:200px;
        overflow-y:auto;
        text-align:left;
    }

    li{
        padding:8px;
        border-bottom:1px solid #ddd;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Stopwatch</h1>

    <div class="display" id="display">00:00:00</div>

    <button class="start" onclick="startStopwatch()">Start</button>
    <button class="pause" onclick="pauseStopwatch()">Pause</button>
    <button class="reset" onclick="resetStopwatch()">Reset</button>
    <button class="lap" onclick="recordLap()">Lap</button>

    <ul id="laps"></ul>
</div>

<script>
    let seconds = 0;
    let minutes = 0;
    let hours = 0;
    let timer = null;

    function updateDisplay() {
        let h = String(hours).padStart(2, '0');
        let m = String(minutes).padStart(2, '0');
        let s = String(seconds).padStart(2, '0');

        document.getElementById("display").innerText =
            `${h}:${m}:${s}`;
    }

    function runStopwatch() {
        seconds++;

        if(seconds === 60){
            seconds = 0;
            minutes++;
        }

        if(minutes === 60){
            minutes = 0;
            hours++;
        }

        updateDisplay();
    }

    function startStopwatch() {
        if(timer !== null) return;
        timer = setInterval(runStopwatch, 1000);
    }

    function pauseStopwatch() {
        clearInterval(timer);
        timer = null;
    }

    function resetStopwatch() {
        clearInterval(timer);
        timer = null;

        seconds = 0;
        minutes = 0;
        hours = 0;

        updateDisplay();

        document.getElementById("laps").innerHTML = "";
    }

    function recordLap() {
        let lapTime = document.getElementById("display").innerText;

        let li = document.createElement("li");
        li.textContent = "Lap " +
            (document.getElementById("laps").children.length + 1)
            + ": " + lapTime;

        document.getElementById("laps").appendChild(li);
    }
</script>

</body>
</html>
